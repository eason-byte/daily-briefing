<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 晨间速览 · 双战法选股</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--surface:#161b22;--surface-alt:#1c2333;--border:#30363d;--border-light:#21262d;--text:#e6edf3;--text-secondary:#8b949e;--text-tertiary:#6e7681;--accent:#58a6ff;--accent-bg:#0d419d33;--purple:#a371f7;--purple-bg:#2a1a4a;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.15);--font-sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6}
  .container{max-width:640px;margin:0 auto;padding:0;text-align:center;padding-top:80px}
  .redirect-icon{font-size:48px;margin-bottom:12px}
  h1{font-size:22px;font-weight:600;margin-bottom:8px}
  p{color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  a{color:var(--accent);text-decoration:none;font-size:14px;padding:8px 20px;border:1px solid var(--border);border-radius:6px;display:inline-block;transition:all .15s}
  a:hover{border-color:var(--accent);background:var(--accent-bg)}
</style>
</head>
<body>
<div class="container">
  <div class="redirect-icon">📈</div>
  <h1>已合并到统一首页</h1>
  <p>晨间速览 &amp; 双战法选股已在同一个页面展示</p>
  <a href="../">→ 前往统一首页</a>
</div>
</body>
</html>
