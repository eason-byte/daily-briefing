<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 双战法选股 · 每日分析</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--surface:#161b22;--surface-alt:#1c2333;--border:#30363d;--border-light:#21262d;--text:#e6edf3;--text-secondary:#8b949e;--text-tertiary:#6e7681;--accent:#58a6ff;--accent-bg:#0d419d33;--green:#3fb950;--green-bg:#1b3a1f;--red:#f85149;--red-bg:#3d1416;--amber:#d29922;--amber-bg:#2d1f00;--purple:#a371f7;--purple-bg:#2a1a4a;--teal:#56d4dd;--teal-bg:#1d3b3d;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.15);--font-sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
  .container{max-width:680px;margin:0 auto;padding:0}

  .hero{background:linear-gradient(135deg,#161b22 0%,#1c2333 50%,#0d1117 100%);border-bottom:1px solid var(--border);padding:48px 20px 40px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,var(--accent-bg) 0%,transparent 50%),radial-gradient(circle at 70% 50%,var(--purple-bg) 0%,transparent 50%);opacity:.3;pointer-events:none}
  .hero-icon{font-size:42px;margin-bottom:8px;position:relative}
  .hero-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;position:relative}
  .hero-sub{font-size:14px;color:var(--text-secondary);position:relative}
  .hero-info{margin-top:16px;display:flex;justify-content:center;gap:20px;font-size:12px;color:var(--text-tertiary);position:relative}
  .hero-info span{display:flex;align-items:center;gap:4px}

  .section{padding:24px 20px}
  .sec-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--border);margin-left:8px}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
  .stat-num{font-size:22px;font-weight:700;font-family:var(--font-mono);color:var(--accent)}
  .stat-label{font-size:11px;color:var(--text-tertiary);margin-top:2px}

  .archive{display:flex;flex-direction:column;gap:8px}
  .a-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:all .2s}
  .a-item:hover{border-color:var(--accent);box-shadow:0 2px 16px rgba(88,166,255,.12);transform:translateY(-1px)}
  .a-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .a-date{font-size:16px;font-weight:600}
  .a-dow{font-size:12px;color:var(--text-tertiary)}
  .a-tag{font-size:10px;font-weight:500;color:var(--accent);background:var(--accent-bg);padding:2px 10px;border-radius:20px;flex-shrink:0}
  .a-arrow{color:var(--text-tertiary);font-size:16px;flex-shrink:0}
  .a-item:hover .a-arrow{color:var(--accent)}

  .a-desc{flex:1;margin:0 12px;font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

  .empty{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:14px}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

  .footer{text-align:center;padding:20px 20px 32px;font-size:10px;color:var(--text-tertiary);line-height:1.7;border-top:1px solid var(--border-light)}
  .footer a{color:var(--accent);text-decoration:none}.footer a:hover{text-decoration:underline}

  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;margin-top:8px;transition:all .15s}
  .back-link:hover{border-color:var(--accent);background:var(--accent-bg)}

  @media(max-width:480px){
    .hero{padding:36px 16px 28px}.hero-title{font-size:22px}
    .section{padding:16px 14px}
    .stats{gap:6px}.stat{padding:12px 8px}.stat-num{font-size:18px}
    .a-item{padding:12px 14px}.a-date{font-size:14px}
    .a-desc{display:none}
  }
</style>
</head>
<body>
<div class="container">

<div class="hero">
  <div class="hero-icon">📊</div>
  <div class="hero-title">双战法选股 · 每日分析</div>
  <div class="hero-sub">冰点反抽 + 龙头主升浪 · 每日18:05自动生成</div>
  <div class="hero-info">
    <span>🧊 冰点反抽</span>
    <span>🐉 龙头主升浪</span>
    <span>📡 Tushare+AKShare</span>
    <span>🌙 收盘后运行</span>
  </div>
</div>

<div class="section">
  <div class="sec-label">📅 历史分析</div>
  <div id="archiveList"></div>
</div>

<div class="footer">
  数据源：Tushare Pro · AKShare · 东方财富 · 新浪财经<br>
  每日18:05 CST 自动生成 · 非高峰时段运行 · 基于ds-hermes deepseek-v4-pro<br>
  双战法：冰点反抽模式 + 龙头主升浪战法 &nbsp;·&nbsp; <a href="https://github.com/eason-byte/daily-briefing">GitHub</a><br>
  <a href="https://19930808.xyz" style="color:var(--text-tertiary)">19930808.xyz</a><br>
  <a href="../" class="back-link">🏠 返回晨间速览首页</a>
  <br><br>
  ⚠️ 基于交易纪律框架分析，仅供参考，不构成投资建议
</div>

</div>

<script>
const BRIEFINGS = [{"date": "2026-06-30", "dow": "周二", "desc": "冰点反抽不适用(正常行情)，龙头主升浪确认芯片半导体主线。水晶光电、中科曙光、新洁能三龙候选。总建议：不动手等回调。"}];

(function(){
  const list = document.getElementById('archiveList');
  if (!BRIEFINGS.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无分析记录<br><span style="font-size:12px;color:var(--text-tertiary)">今日18:05开始自动生成</span></div>';
    return;
  }
  const seen = {};
  const unique = BRIEFINGS.filter(b => {
    if (seen[b.date]) return false;
    seen[b.date] = true;
    return true;
  });
  list.innerHTML = '<div class="archive">' + unique.sort((a,b)=>b.date.localeCompare(a.date)).map(b =>
    `<a class="a-item" href="${b.date}.html">
      <div class="a-left">
        <div>
          <div class="a-date">${b.date}</div>
          <div class="a-dow">${b.dow}</div>
        </div>
      </div>
      <div class="a-desc">${b.desc || ''}</div>
      <span class="a-tag">最新</span>
      <span class="a-arrow">→</span>
    </a>`
  ).join('') + '</div>';
})();
</script>
</body>
</html>
